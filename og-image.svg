<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="100%" stop-color="#1c2336"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6695ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.18" fill="#ffffff">
    <circle cx="980" cy="120" r="220"/>
    <circle cx="120" cy="540" r="180"/>
  </g>

  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#badge)"/>
    <text x="60" y="76" text-anchor="middle"
          font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="56" font-weight="800" fill="#ffffff">MH</text>
  </g>

  <g transform="translate(240, 180)" fill="#ffffff"
     font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="64" font-weight="800" letter-spacing="-1">Manual Humanizer</text>
    <text x="0" y="60" font-size="30" font-weight="500" fill="#cbd5e1">
      Rewrite AI text sentence-by-sentence  until it sounds genuinely you.
    </text>
  </g>

  <g transform="translate(80, 380)" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" fill="#e6ebf5">
    <g>
      <rect x="0" y="0" width="320" height="64" rx="14" fill="#1f2a44" stroke="#2a3450"/>
      <text x="24" y="40" font-size="22" font-weight="600">Click-to-replace thesaurus</text>
    </g>
    <g transform="translate(340, 0)">
      <rect x="0" y="0" width="320" height="64" rx="14" fill="#1f2a44" stroke="#2a3450"/>
      <text x="24" y="40" font-size="22" font-weight="600">AI tweak with OpenAI</text>
    </g>
    <g transform="translate(680, 0)">
      <rect x="0" y="0" width="320" height="64" rx="14" fill="#1f2a44" stroke="#2a3450"/>
      <text x="24" y="40" font-size="22" font-weight="600">Refresh-safe auto-save</text>
    </g>
  </g>

  <rect x="80" y="500" width="1040" height="6" rx="3" fill="url(#accent)"/>

  <text x="80" y="560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" fill="#9aa6bd">
    Free · Browser-only · No signup · Open source
  </text>
</svg>
